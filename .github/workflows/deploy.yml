name: CI and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PHP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Lint PHP files
        shell: bash
        run: |
          mapfile -t files < <(find . -type f -name '*.php' \
            -not -path './.git/*' \
            -not -path './vendor/*')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No PHP files to lint."
            exit 0
          fi
          for file in "${files[@]}"; do
            php -l "$file"
          done

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/code4u_deploy
          chmod 600 ~/.ssh/code4u_deploy
          ssh-keyscan -p "${{ secrets.VPS_PORT || '22' }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy files
        shell: bash
        run: |
          rsync -az --no-owner --no-group --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude '.env.local' \
            --exclude 'admin/config/local.php' \
            --exclude 'admin/uploads/' \
            --exclude 'logs/' \
            --exclude 'contact_logs.txt' \
            --exclude 'node_modules/' \
            --exclude 'vendor/' \
            --exclude '.publish-temp-*/' \
            -e "ssh -i ~/.ssh/code4u_deploy -p ${{ secrets.VPS_PORT || '22' }}" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_TARGET }}/"

      - name: Remote post-deploy (proprietaire + permissions)
        shell: bash
        run: |
          ssh -i ~/.ssh/code4u_deploy -p "${{ secrets.VPS_PORT || '22' }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'T="${{ secrets.VPS_TARGET }}"; mkdir -p "$T/logs"; OWNER=$(stat -c "%U" "$(dirname "$T")"); chown -R "$OWNER" "$T"; find "$T" -type d -exec chmod 755 {} +; find "$T" -type f -exec chmod 644 {} +; [ -f "$T/admin/config/local.php" ] && chmod 640 "$T/admin/config/local.php"; echo post-deploy-done'
