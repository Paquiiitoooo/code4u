<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement securise - Code4U</title>
    <link rel="icon" href="assets/images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        :root {
            --blue: #0878d8;
            --ink: #15151d;
            --muted: #626875;
            --line: #dedede;
            --soft: #f6f7f9;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, Arial, sans-serif;
            color: var(--ink);
            background: linear-gradient(90deg, #fff 0 50%, #fafafa 50% 100%);
        }
        .checkout {
            min-height: 100vh;
            display: grid;
            grid-template-columns: minmax(320px, 1fr) minmax(360px, 480px);
            gap: clamp(2rem, 7vw, 8rem);
            max-width: 1200px;
            margin: 0 auto;
            padding: clamp(2rem, 6vw, 4.5rem) 2rem;
        }
        .summary, .payment { padding-top: 0.5rem; }
        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: clamp(2rem, 7vw, 5rem);
            font-size: 1rem;
        }
        .back {
            width: 36px;
            height: 36px;
            border: 0;
            border-radius: 999px;
            background: #fff;
            color: var(--muted);
            box-shadow: 0 3px 14px rgba(15, 23, 42, .12);
            cursor: pointer;
        }
        .summary small {
            display: block;
            color: var(--muted);
            font-size: 1.05rem;
            margin-bottom: 0.6rem;
        }
        .summary strong {
            display: block;
            font-size: clamp(2.4rem, 5vw, 3.6rem);
            letter-spacing: 0;
            line-height: 1;
        }
        .summary p {
            color: var(--muted);
            line-height: 1.6;
            max-width: 440px;
            margin-top: 1.5rem;
        }
        h1 {
            font-size: 1.35rem;
            font-weight: 600;
            margin: 0 0 1.2rem;
        }
        .box {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 6px 18px rgba(15, 23, 42, .07);
        }
        .email {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem 1.15rem;
            margin-bottom: 2.2rem;
            color: var(--muted);
        }
        .email b {
            color: var(--ink);
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .method { padding: 1.25rem; margin-bottom: 1.8rem; }
        .method-title {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1rem;
            margin-bottom: 1.35rem;
        }
        label {
            display: block;
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 0.55rem;
        }
        #payment-element {
            padding: 0.1rem 0 0.5rem;
        }
        .pay {
            width: 100%;
            min-height: 54px;
            border: 0;
            border-radius: 7px;
            background: var(--blue);
            color: #fff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 14px rgba(8, 120, 216, .28);
        }
        .pay:disabled { opacity: .6; cursor: wait; }
        .message {
            min-height: 22px;
            color: #b42318;
            margin: 0.9rem 0 0;
            font-size: 0.92rem;
            line-height: 1.5;
        }
        .foot {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #777;
            font-size: 0.86rem;
            padding: 0 1.25rem;
        }
        .foot strong { color: #635bff; }
        .loader {
            display: grid;
            place-items: center;
            min-height: 100vh;
            color: var(--muted);
        }
        @media (max-width: 820px) {
            body { background: #fff; }
            .checkout { grid-template-columns: 1fr; gap: 2rem; padding: 1.25rem; }
            .brand { margin-bottom: 2rem; }
            .payment { padding-top: 0; }
        }
    </style>
</head>
<body>
    <div class="loader" id="loader">Chargement du paiement...</div>
    <main class="checkout" id="checkout" hidden>
        <section class="summary">
            <div class="brand">
                <button class="back" type="button" id="backBtn" aria-label="Retour"><i class="fas fa-arrow-left"></i></button>
                <span><i class="fas fa-store"></i></span>
                <span>Code4U</span>
            </div>
            <small id="checkoutTitle">Paiement Code4U</small>
            <strong id="amount">--</strong>
            <p>Paiement securise par carte. Vos informations bancaires sont chiffrees et traitees directement par Stripe.</p>
        </section>
        <section class="payment">
            <h1>Coordonnees</h1>
            <div class="box email">
                <span>E-mail</span>
                <b id="email">--</b>
            </div>
            <h1>Moyen de paiement</h1>
            <form id="payment-form">
                <div class="box method">
                    <div class="method-title"><i class="fas fa-credit-card"></i><span>Carte</span></div>
                    <label>Informations de paiement</label>
                    <div id="payment-element"></div>
                </div>
                <button class="pay" id="submit" type="submit">Payer</button>
                <p class="message" id="message"></p>
            </form>
            <div class="foot">
                <span>Propulse par <strong>stripe</strong></span>
                <span>|</span>
                <span>Conditions d'utilisation</span>
                <span>Confidentialite</span>
            </div>
        </section>
    </main>
    <noscript>JavaScript doit etre active pour payer en ligne.</noscript>
    <script>
        (function () {
            var API_BASE = 'https://api.erp.code4u.fr';
            var params = new URLSearchParams(window.location.search);
            var token = params.get('token') || '';
            var type = params.get('type') || 'invoice';
            var stripe = null;
            var elements = null;
            var clientSecret = null;
            var submit = document.getElementById('submit');
            var message = document.getElementById('message');

            function money(amount) {
                return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(Number(amount || 0));
            }

            function configForType() {
                if (type === 'subscription') {
                    return {
                        detailsPath: '/public/pay/subscription/' + encodeURIComponent(token) + '/details',
                        intentPath: '/public/pay/subscription/' + encodeURIComponent(token) + '/intent',
                        itemKey: 'subscription',
                        titlePrefix: 'Abonnement',
                        successPay: 'sub_success',
                        invalidMessage: 'Lien d abonnement invalide.',
                    };
                }
                return {
                    detailsPath: '/public/pay/invoice/' + encodeURIComponent(token) + '/details',
                    intentPath: '/public/pay/invoice/' + encodeURIComponent(token) + '/intent',
                    itemKey: 'invoice',
                    titlePrefix: 'Facture',
                    successPay: 'success',
                    invalidMessage: 'Lien de paiement invalide.',
                };
            }

            function showError(text) {
                document.getElementById('loader').hidden = true;
                document.getElementById('checkout').hidden = false;
                document.getElementById('payment-form').hidden = true;
                document.querySelector('.foot').hidden = true;
                document.getElementById('checkoutTitle').textContent = 'Paiement indisponible';
                document.getElementById('amount').textContent = '--';
                document.getElementById('email').textContent = 'Erreur';
                message.hidden = false;
                message.textContent = text || 'Paiement indisponible.';
            }

            async function api(path, options) {
                var controller = new AbortController();
                var timer = setTimeout(function () { controller.abort(); }, 12000);
                var requestOptions = Object.assign({}, options || {}, { signal: controller.signal });
                var response;
                var raw;
                var data;
                try {
                    response = await fetch(API_BASE + path, requestOptions);
                    raw = await response.text();
                } catch (error) {
                    clearTimeout(timer);
                    if (error && error.name === 'AbortError') {
                        throw new Error('L API de paiement ne repond pas. Le backend ERP doit etre redeploye ou redemarre.');
                    }
                    throw new Error('Impossible de joindre l API de paiement. Verifiez le serveur ERP et CORS.');
                }
                clearTimeout(timer);
                try {
                    data = raw ? JSON.parse(raw) : {};
                } catch (error) {
                    throw new Error('Reponse API invalide sur ' + path + '. Le backend ERP n est probablement pas a jour.');
                }
                if (!response.ok || data.success === false) {
                    throw new Error(data.message || 'Paiement indisponible');
                }
                return data;
            }

            async function init() {
                var config = configForType();
                if ((type !== 'invoice' && type !== 'subscription') || !/^[a-f0-9]{32,64}$/i.test(token)) {
                    showError(config.invalidMessage);
                    return;
                }
                try {
                    var details = await api(config.detailsPath);
                    var item = details[config.itemKey];
                    if (!item || !details.publishableKey) {
                        throw new Error('Reponse de paiement incomplete. Le backend ERP doit etre redeploye.');
                    }
                    document.getElementById('checkoutTitle').textContent = config.titlePrefix + ' ' + item.number + ' - Code4U';
                    document.getElementById('amount').textContent = money(item.amount);
                    document.getElementById('email').textContent = item.email || 'Client Code4U';
                    submit.textContent = 'Payer ' + money(item.amount);

                    var intent = await api(config.intentPath, { method: 'POST' });
                    clientSecret = intent.clientSecret;
                    if (!clientSecret) {
                        throw new Error('Client secret Stripe manquant. Le backend ERP doit etre redeploye.');
                    }
                    if (!window.Stripe) {
                        throw new Error('Stripe.js ne s est pas charge. Desactivez le bloqueur ou verifiez js.stripe.com.');
                    }
                    stripe = Stripe(details.publishableKey);
                    elements = stripe.elements({
                        clientSecret: clientSecret,
                        appearance: {
                            theme: 'stripe',
                            variables: { colorPrimary: '#0878d8', borderRadius: '7px' },
                        },
                    });
                    elements.create('payment', { layout: 'tabs' }).mount('#payment-element');
                    document.getElementById('loader').hidden = true;
                    document.getElementById('checkout').hidden = false;
                } catch (error) {
                    showError(error.message);
                }
            }

            setTimeout(function () {
                if (!document.getElementById('loader').hidden) {
                    showError('Chargement trop long. Le backend ERP ne repond pas sur les routes de paiement.');
                }
            }, 15000);

            document.getElementById('backBtn').addEventListener('click', function () {
                window.location.href = 'espace-client.html?pay=cancel';
            });

            document.getElementById('payment-form').addEventListener('submit', async function (event) {
                event.preventDefault();
                if (!stripe || !elements || !clientSecret) return;
                submit.disabled = true;
                message.textContent = '';
                var config = configForType();
                var result = await stripe.confirmPayment({
                    elements: elements,
                    confirmParams: {
                        return_url: window.location.origin + '/espace-client.html?pay=' + config.successPay,
                    },
                });
                if (result.error) {
                    message.textContent = result.error.message || 'Paiement refuse.';
                    submit.disabled = false;
                }
            });

            init();
        })();
    </script>
</body>
</html>
